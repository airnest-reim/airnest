version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: airnest-postgres
    environment:
      POSTGRES_USER: airnest
      POSTGRES_PASSWORD: airnest_dev_password
      POSTGRES_DB: airnest_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airnest"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: airnest-app
    environment:
      DATABASE_URL: postgresql://airnest:airnest_dev_password@postgres:5432/airnest_dev
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
